<!-- Styles -->
<style>
	#chartdiv {
		width: 500px;
		height: 500px;
	}
</style>
<!-- Resources -->
<script src="index.js"></script>
<script src="map.js"></script>
<script src="worldLow.js"></script>
<script src="Animated.js"></script>
<script src="cn_ZH.js"></script>
<script src="exporting.js"></script>
<!-- <script src="https://www.amcharts.com/lib/5/geodata/worldHigh.js"></script> -->
<!-- Chart code -->
<script>
	am5.ready(function () {
		// Create root element
		// https://www.amcharts.com/docs/v5/getting-started/#Root_element
		var root = am5.Root.new('chartdiv');
		// Set themes
		// https://www.amcharts.com/docs/v5/concepts/themes/
		root.setThemes([
			am5themes_Animated.new(root)
		]);
		// Create the map chart
		// https://www.amcharts.com/docs/v5/charts/map-chart/
		var chart = root.container.children.push(am5map.MapChart.new(root, {
			panX: 'rotateX',
			panY: 'rotateY',
			projection: am5map.geoOrthographic(),
			paddingBottom: 20,
			paddingTop: 20,
			paddingLeft: 20,
			paddingRight: 20,

		}));

		// chart.set('centerMapOnZoomOut', true);
		// Create main polygon series for countries
		// https://www.amcharts.com/docs/v5/charts/map-chart/map-polygon-series/
		var polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
			geoJSON: am5geodata_worldLow,
			// geoJSON: am5geodata_worldHigh,
			geodataNames: am5geodata_lang_cn_ZH,
			// include:['CN']
		}));
		// polygonSeries.getDataItemById('CN').set('interactive',true);
		polygonSeries.mapPolygons.template.setAll({
			fill: am5.color('#aaa'),
			stroke: am5.color('#fff'),
			strokeWidth: 0.2,
			tooltipText: '{name}',
			toggleKey: 'active',
			interactive: true
		});
		polygonSeries.mapPolygons.template.states.create('hover', {
			fill: root.interfaceColors.get('primaryButtonHover')
		});
		polygonSeries.mapPolygons.template.states.create('active', {
			fill: root.interfaceColors.get('primaryButtonHover')
		});
		// Create series for background fill
		// https://www.amcharts.com/docs/v5/charts/map-chart/map-polygon-series/#Background_polygon
		var backgroundSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {}));
		backgroundSeries.mapPolygons.template.setAll({
			fill: root.interfaceColors.get('alternativeBackground'),
			fillOpacity: 0.1,
			strokeOpacity: 0
		});
		backgroundSeries.data.push({
			geometry: am5map.getGeoRectangle(90, 180, -90, -180)
		});

		// === 特别高亮 0° 经线（本初子午线，伦敦格林威治那条）===
		/*
		var primeMeridianSeries = chart.series.push(am5map.GraticuleSeries.new(root, {
			step: 15,                     // 只会画一条
			longitude: 120                   // 强制画在 0° 经度
		}));
		primeMeridianSeries.mapLines.template.setAll({
			stroke: am5.color('#ffcd00'),  // 金色，和中国高亮同色
			strokeWidth: 1,
			strokeOpacity: 0.5
		});
		*/
		//添加经纬度
		var graticuleSeries = chart.series.unshift(am5map.GraticuleSeries.new(root, {
			step: 30
		}));
		graticuleSeries.mapLines.template.set('strokeOpacity', 0.1);


		// Set up events
		var previousPolygon;
		polygonSeries.mapPolygons.template.on('active', function (active, target) {
			if (previousPolygon && previousPolygon != target) {
				previousPolygon.set('active', false);
			}
			if (target.get('active')) {
				selectCountry(target.dataItem.get('id'));
			}
			previousPolygon = target;
		});
		console.log(chart);
		function selectCountry(id) {
			var dataItem = polygonSeries.getDataItemById(id);
			var target = dataItem.get('mapPolygon');
			if (target) {
				var centroid = target.geoCentroid();
				if (centroid) {
					chart.animate({
						key: 'rotationX',
						to: -centroid.longitude,
						duration: 1000,
						easing: am5.ease.inOut(am5.ease.cubic)
					});
					chart.animate({
						key: 'rotationY',
						to: -centroid.latitude + 10,
						duration: 1000,
						easing: am5.ease.inOut(am5.ease.cubic)
					});
				}
			}
		}
		// 设置导出图像
		var exporting = am5plugins_exporting.Exporting.new(root, {
			menu: am5plugins_exporting.ExportingMenu.new(root, {})
		});
		//导出图像时暂时修改图像尺寸；导出后恢复
		exporting.events.on('exportstarted', function () {
			root.dom.style.width = '600px';
			root.dom.style.height = '600px';
			root.resize();
		});
		exporting.events.on('exportfinished', function () {
			root.dom.style.width = '';
			root.dom.style.height = '';
			root.resize();
		});
		// Uncomment this to pre-center the globe on a country when it loads
		polygonSeries.events.on('datavalidated', function () {
			var china = polygonSeries.getDataItemById('CN');
			if (china && china.get('mapPolygon')) {
				var polygon = china.get('mapPolygon');
				polygon.set('active', true); // 高亮
				// polygon.set('interactive', true); // 高亮
			}
			selectCountry('CN');
		});
		// Make stuff animate on load
		chart.appear(1000, 100);
	}); // end am5.ready()
</script>
<!-- HTML -->
<div id="chartdiv"></div>
